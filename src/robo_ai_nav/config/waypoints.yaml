# Map-frame waypoints — short legs through center aisle.
#
# Map bounds (warehouse_map.yaml): x=[-8.16, 7.49], y=[-13.0, 8.95]
# WP0 scan (standoff) -> row0/marker 1 -> south transit -> marker 3 -> marker 2 -> spawn.
#
# 2026-07-12 reliability pass:
# - WP0: standoff scan at x=1.5 (not shelf-touch x=2.0) + retreat to aisle peel.
# - M2: peel to (0.35,-7.0) then corridor hint at (-2.0,-7.0); narrow profile.
# - Return: two corridor hints on y=-7.0 then spawn (default profile, not pure planner).

initial_pose:
  x: 0.0
  y: 0.0
  yaw: 0.0

waypoints:
  # Standoff scan for marker 0 (~2.5m sightline to plate at x=4.05). Dwell
  # exits early once id=0 is seen — no need to wedge against the shelf row.
  - name: wp_marker_aruco_0
    x: 1.5
    y: 0.57943
    yaw: 0.0
    expected_aruco_id: 0
    shelf_row_stop: true
    min_clear_x: 2.5
    nav_profile: default
    relocalize_after_scan: true
    relocalize_from_marker: true
    spin_relocalize_after_scan: false
    retreat_after_scan:
      x: 0.35
      y: 0.57943
      yaw: 0.0
    relocalize_after_retreat: true

  # From WP0: peel west on the row, drive north, scan marker 1 (no separate west retreat leg).
  - name: wp_row0_to_marker_1
    nav_profile: tight
    force_sequential: true
    retry_on_fail: true
    relocalize_steps: false
    pause_before_sec: 2.5
    through_poses:
      - {x: 0.35, y: 0.57943, yaw: 1.571, nav_profile: default}
      - {x: 0.35, y: 2.0, yaw: 1.571}
    x: 0.35
    y: 4.0
    yaw: 1.571
    expected_aruco_id: 1
    relocalize_after_scan: true
    relocalize_from_marker: true
    spin_relocalize_after_scan: false
    marker_pose:
      x: 0.0
      y: 6.5
      z: 0.3
      yaw: 1.571

  # South on x=0.35: pause in place at known aisle peel pose, then continue
  # south to a staging pose just above marker 3, on the clear y=-7.0 lane.
  - name: wp_transit_south_to_west
    nav_profile: tight
    force_sequential: true
    retry_on_fail: true
    relocalize_steps: false
    skip_scan: true
    pause_before_sec: 1.0
    through_poses:
      - {x: 0.35, y: 0.57943, yaw: -1.571, dwell_after_sec: 3.0, relocalize_after_dwell: true, relocalize_force: true}
      - {x: 0.35, y: -2.0, yaw: -1.571}
      - {x: 0.35, y: -3.0, yaw: -1.571}
      - {x: 0.35, y: -4.0, yaw: -1.571}
      - {x: 0.35, y: -5.0, yaw: -1.571, dwell_after_sec: 2.0, relocalize_after_dwell: true, relocalize_force: true}
      - {x: 0.35, y: -6.0, yaw: -1.571}
    x: 0.5
    y: -7.0
    yaw: -1.571

  # Marker 3 scan stop. The plate at (0.5, -9) was flipped 2026-07-12 to
  # face NORTH (world yaw -1.571): its old south-facing front was physically
  # unscannable from the only navigable approach — ArUco does not decode
  # from a plate's back face, and every earlier "SCAN OK" here was a stale
  # mid-transit sighting. The stop now sits NE of the plate at ~0.85m,
  # angled to face it (sightline verified live by teleport + /detected_markers,
  # 2026-07-12). This also removes the old y=-9.55 deep-pocket dive next to
  # the pallet-jack pinch — the hardest leg of the mission — entirely.
  - name: wp_marker_aruco_3
    nav_profile: narrow
    force_sequential: true
    retry_on_fail: true
    relocalize_steps: false
    pause_before_sec: 1.0
    mid_leg_pnp_snap: true
    clear_costmap_before_leg: true
    through_poses:
      - {x: 1.0, y: -7.6, yaw: -1.571}
    x: 0.9
    y: -8.3
    yaw: -2.10
    expected_aruco_id: 3
    relocalize_after_scan: true
    relocalize_from_marker: true
    relocalize_force: true
    spin_relocalize_after_scan: false
    marker_pose:
      x: 0.5
      y: -9.0
      z: 0.3
      yaw: 1.571

  # Marker 2 scan stop at the open west wall. DIRECT PLANNER GOAL — no
  # through_poses. The old chain forced a hint at (-2.0,-7.0), which is
  # literally INSIDE the Bucket_01_021 / ClutteringD cluster (occupied on
  # the static map, x=-2.0..-1.2 at y=-7.0). That march-into-the-obstacle
  # is what wedged (86s) and collided ("success sometimes" = threading a
  # ~0.2m gap narrower than the 0.44m robot). NavFn already knows the
  # cluster is there and routes around it (BFS-verified clear path exists,
  # north via y~-5.5 or south via y~-8.4) — a direct goal lets it. narrow
  # profile keeps live lidar on; retry_on_fail keeps the reroute-offset net.
  - name: wp_marker_aruco_2
    nav_profile: narrow
    retry_on_fail: true
    pause_before_sec: 1.0
    clear_costmap_before_leg: true
    x: -5.0
    y: -7.0
    yaw: 3.141
    expected_aruco_id: 2
    relocalize_after_scan: true
    relocalize_from_marker: true
    relocalize_force: true
    spin_relocalize_after_scan: false
    marker_pose:
      x: -6.4
      y: -7.0
      z: 0.3
      yaw: 3.14159

  # Return home: DIRECT PLANNER GOAL (the "use nav2 planner for the last
  # waypoint" ask). The old chain hinted (0.35,-7.0), forcing the return to
  # cross the same bucket cluster east-bound — same collision as the marker-2
  # chain. A direct goal is NOT "a shot through a pinch": NavFn plans through
  # free space only and routes around the cluster (and around the marker-3
  # pocket) on its own. default profile, retry_on_fail keeps the safety net.
  - name: wp_return_to_spawn
    nav_profile: default
    retry_on_fail: true
    skip_scan: true
    pause_before_sec: 1.0
    clear_costmap_before_leg: true
    x: 0.0
    y: 0.0
    yaw: 1.571
