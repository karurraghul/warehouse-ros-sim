# Map-frame waypoints — one stop per ArUco marker plate.
#
# Shelf layout (aruco_0):
#   SHELF_ROW_X = 4.73156
#   SHELF_AISLE_FACE_X ≈ 4.05  (marker mount, aisle-facing shelf front)
#   WP0 at x=2.0 faces shelf for scan; retreat_after_scan backs robot out before WP1.
#
# Open-floor markers use ~0.9 m standoff. Set nav_profile: tight only when a leg
# must enter a narrow aisle; WP0 uses default (safe aisle).

initial_pose:
  x: 0.0
  y: 0.0
  yaw: 0.0

waypoints:
  - name: wp_marker_aruco_0
    x: 2.0
    y: 0.57943
    yaw: 0.0
    expected_aruco_id: 0
    shelf_row_stop: true
    min_clear_x: 2.5
    nav_profile: default
    retreat_after_scan:
      x: 0.0
      y: 0.57943
      yaw: 3.14159
  - name: wp_marker_aruco_1
    x: -1.0
    y: 5.6
    yaw: 1.571
    expected_aruco_id: 1
    nav_profile: default
  - name: wp_marker_aruco_2
    x: -2.5
    y: -7.5
    yaw: 0.0
    expected_aruco_id: 2
    nav_profile: default
  - name: wp_marker_aruco_3
    x: 0.5
    y: -8.1
    yaw: -1.571
    expected_aruco_id: 3
    nav_profile: default
