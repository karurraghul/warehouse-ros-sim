# Map-frame waypoints — short legs through center aisle, no retreats.
#
# WP0 shelf scan -> west along row -> north -> WP1 -> stepped south -> south markers.

initial_pose:
  x: 0.0
  y: 0.0
  yaw: 0.0

waypoints:
  - name: wp_marker_aruco_0
    x: 2.0
    y: 0.57943
    yaw: 0.0
    expected_aruco_id: 0
    shelf_row_stop: true
    min_clear_x: 2.5
    nav_profile: default

  - name: wp_transit_west
    x: 0.0
    y: 0.57943
    yaw: 1.571
    skip_scan: true
    nav_profile: default

  - name: wp_transit_north
    x: 0.0
    y: 2.0
    yaw: 1.571
    skip_scan: true
    nav_profile: default

  - name: wp_marker_aruco_1
    x: 0.0
    y: 3.5
    yaw: 1.571
    expected_aruco_id: 1
    nav_profile: default
    marker_pose:
      x: 0.0
      y: 6.5
      z: 0.3
      yaw: 1.571

  - name: wp_transit_south_mid
    x: 0.0
    y: 1.0
    yaw: -1.571
    skip_scan: true
    nav_profile: default

  - name: wp_transit_south
    x: 0.0
    y: -2.0
    yaw: -1.571
    skip_scan: true
    nav_profile: default

  - name: wp_transit_west_south
    x: -2.5
    y: -7.5
    yaw: 0.0
    skip_scan: true
    nav_profile: default

  - name: wp_marker_aruco_2
    x: -4.2
    y: -8.51815
    yaw: 0.0
    expected_aruco_id: 2
    nav_profile: default
    marker_pose:
      x: -3.74722
      y: -8.51815
      z: 0.3
      yaw: -0.603732

  - name: wp_marker_aruco_3
    x: 0.5
    y: -8.1
    yaw: -1.571
    expected_aruco_id: 3
    nav_profile: default
