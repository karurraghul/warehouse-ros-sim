# Map-frame waypoints — short legs through center aisle, no retreats.
#
# WP0 scan -> one sequential block to marker 1 -> south -> marker 2 -> dock M3.

initial_pose:
  x: 0.0
  y: 0.0
  yaw: 0.0

waypoints:
  - name: wp_marker_aruco_0
    x: 2.0
    y: 0.57943
    yaw: 0.0
    expected_aruco_id: 0
    shelf_row_stop: true
    min_clear_x: 2.5
    nav_profile: default
    relocalize_after_scan: true

  # From WP0: peel west on the row, drive north, scan marker 1 (no separate west retreat leg).
  - name: wp_row0_to_marker_1
    nav_profile: tight
    force_sequential: true
    retry_on_fail: true
    relocalize_steps: true
    pause_before_sec: 1.0
    through_poses:
      - {x: 0.35, y: 0.57943, yaw: 1.571}
      - {x: 0.35, y: 2.0, yaw: 1.571}
    x: 0.35
    y: 4.0
    yaw: 1.571
    expected_aruco_id: 1
    marker_pose:
      x: 0.0
      y: 6.5
      z: 0.3
      yaw: 1.571

  - name: wp_transit_south_mid
    x: 0.35
    y: 1.0
    yaw: -1.571
    skip_scan: true
    nav_profile: tight

  # One forced sequential block: south on x=0.35 then peel west (reroute on any step).
  - name: wp_transit_south_to_west
    nav_profile: tight
    force_sequential: true
    retry_on_fail: true
    skip_scan: true
    through_poses:
      - {x: 0.35, y: -2.0, yaw: -1.571}
      - {x: 0.35, y: -3.0, yaw: -1.571}
      - {x: 0.35, y: -4.0, yaw: -1.571}
      - {x: -2.0, y: -5.0, yaw: 0.0}
    x: -3.8
    y: -8.0
    yaw: 0.0

  - name: wp_marker_aruco_2
    x: -4.2
    y: -8.51815
    yaw: 0.0
    expected_aruco_id: 2
    nav_profile: default
    marker_pose:
      x: -3.74722
      y: -8.51815
      z: 0.3
      yaw: -0.603732
    retreat_after_scan:
      x: -3.5
      y: -9.0
      yaw: 0.0
    retreat_nav_profile: narrow
    retreat_retry_on_fail: true

  # y=-9.55 lane: skip x≈-1.2 (ClutteringD at -1.6,-7.8); jump -2.0 → -0.55 past clutter.
  - name: wp_dock_m2_to_m3
    nav_profile: narrow
    force_sequential: true
    retry_on_fail: true
    pause_before_sec: 1.0
    through_poses:
      - {x: -3.5, y: -9.0, yaw: 0.0}
      - {x: -2.5, y: -9.0, yaw: 0.0}
      - {x: -2.0, y: -9.0, yaw: 0.0}
      - {x: -0.55, y: -9.0, yaw: 0.0}
    x: 0.5
    y: -9.55
    yaw: -1.571
    expected_aruco_id: 3
    marker_pose:
      x: 0.5
      y: -9.0
      z: 0.3
      yaw: 1.571
