# ArUco marker plate poses in the warehouse map frame.
# Keep in sync with src/robo_ai/worlds/warehouse.world and waypoints.yaml standoffs.
# ``yaw`` is the Gazebo model yaw (not the outward plate normal).

markers:
  - name: marker_aruco_0
    aruco_id: 0
    x: 4.05
    y: 0.57943
    z: 0.3
    yaw: 0.0
    notes: Aisle-facing shelf front

  - name: marker_aruco_1
    aruco_id: 1
    x: 0.0
    y: 6.5
    z: 0.3
    yaw: 1.571
    notes: North center aisle; scan at (0, 4.0) facing north, then drive south on x=0

  - name: marker_aruco_2
    aruco_id: 2
    x: -3.74722
    y: -8.51815
    z: 0.3
    yaw: -0.603732
    notes: >-
      West dock floor; visited last, after marker 3. Approached from the
      east along the clear y=-7.0 lane (the y=-8.0 lane clips the
      ClutteringD prop's unmapped SLAM shadow around x=-1.6), then straight
      south on x=-4.2.

  - name: marker_aruco_3
    aruco_id: 3
    x: 0.5
    y: -9.0
    z: 0.3
    # Was 1.571. PnP estimates from this marker came out mirrored: ~pi off
    # in yaw and reflected through the marker plane (e.g. robot truly at
    # (1.0, -9.55, -1.57) estimated as (0.94, -10.76, +2.97)), which is the
    # signature of marker_rotation_in_map()'s "visible face = model yaw + pi"
    # convention not matching this plate's mounting. Flipped so the PnP
    # frame chain lands on the face the robot actually scans. If PnP still
    # validates poorly here, the AMCL/hard-ceiling gates reject it safely.
    yaw: -1.571
    notes: >-
      South center aisle; approached straight south on x=1.0 (rerouted from
      x=0.5, which collides with the pallet-jack/shelf-leg pinch at y=-9.5;
      verified empirically in Gazebo 2026-07-12).
